services:
    laravel.test:
        build:
            context: './docker/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app-custom'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '8000:80'
            # Vite on the host (`npm run dev` in WSL): do NOT publish 5173 — Docker would reserve host :5173 and
            # block Vite; @vite uses VITE_DEV_SERVER_URL (browser → host), no container port needed.
            # If you run Vite *inside* Sail only: uncomment →  - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            # Sail image installs fonts-dejavu (+ liberation, noto; see docker/8.5/Dockerfile); native Studio text needs a local TTF path.
            STUDIO_RENDERING_DEFAULT_FONT_PATH: '${STUDIO_RENDERING_DEFAULT_FONT_PATH:-/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
            - meilisearch
            - mailpit
            - selenium
    mysql:
        image: 'mysql:8.4'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    meilisearch:
        image: 'getmeili/meilisearch:latest'
        ports:
            - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
        environment:
            MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-false}'
        volumes:
            - 'sail-meilisearch:/meili_data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - wget
                - '--no-verbose'
                - '--spider'
                - 'http://127.0.0.1:7700/health'
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
    selenium:
        image: selenium/standalone-chromium
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - '/dev/shm:/dev/shm'
        networks:
            - sail
    phpmyadmin:
        image: phpmyadmin:latest
        ports:
            - '${FORWARD_PHPMYADMIN_PORT:-8080}:80'
        environment:
            PMA_HOST: mysql
            PMA_PORT: 3306
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
        networks:
            - sail
        depends_on:
            - mysql
    queue:
        build:
            context: './docker/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app-custom'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            STUDIO_RENDERING_DEFAULT_FONT_PATH: '${STUDIO_RENDERING_DEFAULT_FONT_PATH:-/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
        restart: unless-stopped
        # Queue worker configuration (local Sail only — staging/production use Horizon):
        # --queue=default,images,images-heavy,pdf-processing,ai,ai-low: uploads, heavy pipeline, PDFs, upload AI metadata/tagging (see docs/UPLOAD_AND_QUEUE.md)
        # --tries=3: Maximum retry attempts per job
        # --timeout=960: Long enough for heavy thumbnails/PDF/AI vision jobs (individual jobs may set their own limits)
        # --sleep=3: Seconds to sleep when no jobs available
        # --max-jobs=1000: Restart worker after N jobs (prevents memory leaks)
        # --max-time=3600: Restart worker after 1 hour (prevents memory leaks)
        command: php artisan queue:work database --queue=default,images,images-heavy,pdf-processing,ai,ai-low --tries=3 --timeout=960 --sleep=3 --max-jobs=1000 --max-time=3600
    # Studio: baked composition MP4 export (ProcessStudioCompositionVideoExportJob → FFmpeg).
    # Requires QUEUE_CONNECTION=database in .env (or use redis + Horizon in production).
    # Image must include ffmpeg (see docker/8.5/Dockerfile); container shares app codebase with laravel.test.
    queue_video_heavy:
        build:
            context: './docker/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app-custom'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            STUDIO_RENDERING_DEFAULT_FONT_PATH: '${STUDIO_RENDERING_DEFAULT_FONT_PATH:-/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
        restart: unless-stopped
        # --timeout must be >= studio_video.export_job_timeout_seconds (default 12600) for canvas-runtime MP4 bakes.
        command: php artisan queue:work database --queue=video-heavy --tries=1 --timeout=14400 --sleep=3 --max-jobs=50 --max-time=18000
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
    sail-meilisearch:
        driver: local
